<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Registo - ProjetoDesportivo</title>
    <link rel="stylesheet" href="css/registar.css">
</head>
<body>

    <div class="registo-card">
        <h1>Registo</h1>

        <form action="php/registar.php" method="POST">
            <input type="text" name="nome" placeholder="Nome completo" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <select name="documento_tipo" required>
                <option value="">Tipo de documento</option>
                <option value="Cartão de Cidadão">Cartão de Cidadão</option>
                <option value="Passaporte">Passaporte</option>
                <option value="Outro">Outro</option>
            </select>

            <input type="text" name="documento_numero" placeholder="Número do documento" required>
            <input type="text" name="nif" placeholder="NIF opcional">

            <button type="submit">Criar conta</button>
        </form>

        <p>Já tem conta? <a href="login.html">Login</a></p>
        <p><a href="index.html">Voltar ao início</a></p>
    </div>

</body>
</html>
